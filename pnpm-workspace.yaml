packages:
  - 'doc'

# ── zfb doc-app install policy (read only from the workspace ROOT by pnpm) ──
# The doc site at doc/ is a zfb host-app. zfb + its platform binary, sharp, and
# workerd need their build scripts to run; minimumReleaseAgeExclude lets the
# pinned pre-release zfb/zudo-doc versions install despite a global minimum
# release-age policy. Copied from the reference repo's pnpm-workspace.yaml.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - '@takazudo/zfb-adapter-cloudflare@0.1.0-next.51'
  - '@takazudo/zfb-darwin-arm64@0.1.0-next.51'
  - '@takazudo/zfb-darwin-x64@0.1.0-next.51'
  - '@takazudo/zfb-linux-arm64-gnu@0.1.0-next.51'
  - '@takazudo/zfb-linux-x64-gnu@0.1.0-next.51'
  - '@takazudo/zfb-runtime@0.1.0-next.51'
  - '@takazudo/zfb-win32-x64-msvc@0.1.0-next.51'
  - '@takazudo/zfb@0.1.0-next.51'
  - '@takazudo/zudo-doc-history-server@0.2.11'
  - '@takazudo/zudo-doc@0.2.11'
  - create-zudo-doc@0.2.11
